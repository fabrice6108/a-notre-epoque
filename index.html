<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Personnalise ton affiche</title>
<style>
body{
    text-align:center;
    font-family:Arial;
    background:#f5f5f5;
}

canvas{
    margin-top:20px;
    border:1px solid #ccc;
    max-width:90%;
}

input[type="file"]{
    margin-top:20px;
    padding:15px;
    font-size:18px;
    background:#1a7f5a;
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
}
button{
    margin-top:40px;
    padding:15px 30px;
    font-size:18px;
    background:#000;
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

button:hover{
    background:#333;
}
</style>
</head>
<body>

<h2>Ajoute ta photo dans l'affiche</h2>

<label for="upload" style="display:block;">
    <span style="display:inline-block; padding:15px 25px; background:#1a7f5a; color:white; border-radius:10px; cursor:pointer;">
        📷 Choisir une photo
    </span>
</label>

<input type="file" id="upload" accept="image/*" style="display:none;">

<canvas id="canvas" width="800" height="800"></canvas>

<br>

<button onclick="download()">📥 Télécharger mon affiche</button>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let background = new Image();
background.src = "affiche.png"; // 👉 mets ton image ici

background.onload = function(){
    ctx.drawImage(background, 0, 0, canvas.width, canvas.height);
}

document.getElementById("upload").addEventListener("change", function(e){
    const file = e.target.files[0];
    const reader = new FileReader();

    reader.onload = function(event){
        let userImg = new Image();
        userImg.src = event.target.result;

        userImg.onload = function(){

            // redessine l'affiche
            ctx.drawImage(background, 0, 0, canvas.width, canvas.height);

            // position du cercle (à ajuster)
            let x = 212;
            let y = 118;
            let size = 350;

            ctx.save();

            // cercle de découpe
            ctx.beginPath();
            ctx.arc(x + size/2, y + size/2, size/2, 0, Math.PI*2);
            ctx.closePath();
            ctx.clip();

            ctx.drawImage(userImg, x, y, size, size);

            ctx.restore();
        }
    }
    reader.readAsDataURL(file);
});

function download(){
    const link = document.createElement("a");
    link.download = "affiche.png";
    link.href = canvas.toDataURL();
    link.click();
}
</script>

</body>
</html>
